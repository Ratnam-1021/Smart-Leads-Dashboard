version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - '5001:5000'
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/smartleads
      - JWT_SECRET=development_secret_do_not_use_in_prod
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:5001/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true

  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
